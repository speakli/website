          - heading "Speakli s'intègre t-il à nos outils ?" [level=3] [ref=e238]
          - paragraph [ref=e242]: Oui, notre interface s’adapte à votre DUI. L’intégration est rapide, sans double saisie ni perte de temps.
        - generic [ref=e245] [cursor=pointer]:
          - heading "La solution est-elle conforme aux normes de sécurité ?" [level=3] [ref=e248]
          - paragraph [ref=e252]: Oui, la sécurité et la confidentialité sont au cœur du produit. Notre solution respecte l’ensemble des exigences RGPD et HDS, garantissant la sécurité et la confidentialité des données.
        - generic [ref=e255] [cursor=pointer]:
          - heading "Quels bénéfices pour les équipes ?" [level=3] [ref=e258]
          - paragraph [ref=e262]: "Des équipes libérées de leur charge administrative et mentale, et plus de confort de vie au quotidien : ils documentent à la voix, en temps réel, pour pouvoir enfin se concentrer sur ce qui compte vraiment : les résidents."
      - generic [ref=e264]:
        - generic [ref=e266] [cursor=pointer]:
          - heading "Quel est l’impact sur la prise en charge des résidents ?" [level=3] [ref=e269]
          - paragraph [ref=e273]: Le temps économisé sur la saisie des informations est maintenant consacré pleinement aux résidents (écoute active, activités, accompagnement). Une traçabilité de qualité en temps réel permet également d'assurer une prise en charge continue et adaptée.
        - generic [ref=e276] [cursor=pointer]:
          - heading "Quel est l’impact sur les financements ?" [level=3] [ref=e279]
          - paragraph [ref=e283]: Une grande partie des dotations soin/dépendance se justifie via la traçabilité. Speakli augmente la qualité et la quantité d’informations documentées en temps réel, ce qui facilite la justification des besoins et limite le risque de sous-dotation.
        - generic [ref=e286] [cursor=pointer]:
          - heading "Speakli fonctionne sur quel support ?" [level=3] [ref=e289]
          - paragraph [ref=e293]: L’outil est pensé mobile-first, pour une utilisation simple sur le terrain (smartphone, tablette, selon vos équipements). La solution a même été pensée pour fonctionner hors-ligne (sans wifi).
